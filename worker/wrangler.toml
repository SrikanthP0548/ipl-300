name = "ipl-300"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Set the real allowed origin once the GitHub Pages URL is known, e.g.
[vars]
ALLOWED_ORIGIN = "https://ipl-300.com,https://www.ipl-300.com,http://localhost:5173"

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = false

# POOL_SECRET (HMAC signing key for squad-pool / result tokens) is NOT set here.
# For local dev, put it in a .dev.vars file (gitignored):
#   POOL_SECRET=some-long-random-dev-only-string
# For production, set it with:
#   npx wrangler secret put POOL_SECRET
