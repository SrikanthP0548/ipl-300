name = "ipl-300"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Set the real allowed origin once the GitHub Pages URL is known, e.g.
[vars]
ALLOWED_ORIGIN = "https://ipl-300.com,https://www.ipl-300.com,http://localhost:5173"

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = false

# POOL_SECRET (HMAC signing key for squad-pool / result tokens) is NOT set here.
# For local dev, put it in a .dev.vars file (gitignored):
#   POOL_SECRET=some-long-random-dev-only-string
# For production, set it with:
#   npx wrangler secret put POOL_SECRET

# Leaderboard storage. `wrangler dev` runs D1 against a local SQLite file
# automatically (no cloud account needed) as long as this block is present,
# so database_id below can stay a placeholder for local dev. For production:
#   npx wrangler d1 create ipl300-leaderboard
# then replace database_id with the id it prints, and run migrations with:
#   npx wrangler d1 migrations apply ipl300-leaderboard --remote
[[d1_databases]]
binding = "DB"
database_name = "ipl300-leaderboard"
database_id = "434bd284-1e27-431b-8909-b2ed1cc4ec3f"
